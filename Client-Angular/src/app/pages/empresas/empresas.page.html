@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Empresas..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar las Empresas" ></app-alert>
    }

    @case('success'){
        <app-empresas-table [empresas]="empresas"></app-empresas-table>
    }

}
